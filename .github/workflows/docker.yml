name: Docker Build and Deploy

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: ./client/Dockerfile
            context: ./client
          - name: backend
            dockerfile: ./Dockerfile
            context: .
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: Build and test Docker image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: false
        load: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        echo "🧪 Testing Docker image..."
        # Run container and test
        CONTAINER_NAME="test-${{ matrix.name }}-${{ github.sha }}"
        docker run -d --name $CONTAINER_NAME ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.name }}:$(echo ${{ steps.meta.outputs.tags }} | cut -d',' -f1)
        
        # Wait for container to start
        sleep 10
        
        # Test frontend
        if [ "${{ matrix.name }}" = "frontend" ]; then
          docker exec $CONTAINER_NAME curl -f http://localhost:5173 || echo "Frontend test skipped"
        fi
        
        # Test backend
        if [ "${{ matrix.name }}" = "backend" ]; then
          docker exec $CONTAINER_NAME curl -f http://localhost:5000/health || echo "Backend health check skipped"
        fi
        
        # Clean up
        docker stop $CONTAINER_NAME
        docker rm $CONTAINER_NAME
        
    - name: Build and push Docker image
      if: github.event_name != 'pull_request'
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  docker-compose-build:
    name: Build with Docker Compose
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build with Docker Compose
      run: |
        echo "🐳 Building with Docker Compose..."
        docker compose build
        
    - name: Test with Docker Compose
      run: |
        echo "🧪 Testing Docker Compose setup..."
        docker compose up -d
        
        # Wait for services to start
        sleep 30
        
        # Test services
        docker compose exec frontend curl -f http://localhost:5173 || echo "Frontend test skipped"
        docker compose exec backend curl -f http://localhost:5000 || echo "Backend test skipped"
        
        # Clean up
        docker compose down

  multi-arch-build:
    name: Multi-Architecture Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: linux/amd64,linux/arm64
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build and push multi-arch images
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        labels: |
          org.opencontainers.image.title=TravelGen
          org.opencontainers.image.description=AI-Powered Travel Itinerary Generator
          org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

  security-scan:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.28.0'
        
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
        
    - name: Deploy to Kubernetes
      run: |
        echo "☸️ Deploying to Kubernetes..."
        export KUBECONFIG=kubeconfig
        
        # Apply Kubernetes manifests
        kubectl apply -f k8s/ -n travelgen
        
        # Wait for rollout
        kubectl rollout status deployment/travelgen-frontend -n travelgen
        kubectl rollout status deployment/travelgen-backend -n travelgen
        
        # Get service URLs
        kubectl get services -n travelgen

  cleanup:
    name: Cleanup Old Images
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Delete old container images
      uses: actions/delete-package-versions@v5
      with:
        package-name: ${{ env.IMAGE_NAME }}-frontend
        package-type: 'container'
        keep-only: 5
        delete-only-untagged-versions: true
